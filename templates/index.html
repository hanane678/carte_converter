<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardForge — Convertisseur JSON</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface-2: #1a1a24;
  --border: #2a2a3a;
  --border-bright: #3d3d55;
  --accent: #6c63ff;
  --accent-2: #ff6b9d;
  --accent-3: #00d4aa;
  --text: #e8e8f0;
  --text-muted: #7070a0;
  --text-dim: #3a3a55;
  --success: #00d4aa;
  --warning: #ffb347;
  --radius: 12px;
  --radius-lg: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  position: relative;
  overflow-x: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Glow orbs */
body::after {
  content: '';
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
  top: -200px; left: -200px;
  pointer-events: none;
  z-index: 0;
}

.orb-2 {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,107,157,0.08) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  width: 100%;
  max-width: 560px;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
}

.logo-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 30px rgba(108,99,255,0.4);
}

.logo-text {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 40%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  color: var(--text-muted);
  font-size: 0.875rem;
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  letter-spacing: 0.5px;
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 24px 64px rgba(0,0,0,0.5);
}

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.tab-btn {
  flex: 1;
  padding: 1rem;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
}

.tab-btn::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.tab-btn.active {
  color: var(--text);
  background: rgba(108,99,255,0.06);
}

.tab-btn.active::after {
  transform: scaleX(1);
}

.tab-btn:hover:not(.active) {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}

.tab-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  background: var(--surface-2);
  transition: all 0.2s;
}

.tab-btn.active .tab-icon {
  background: linear-gradient(135deg, rgba(108,99,255,0.3), rgba(255,107,157,0.3));
}

.tab-content { padding: 2rem; }
.tab-pane { display: none; animation: fadeIn 0.3s ease; }
.tab-pane.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.form-group {
  margin-bottom: 1.25rem;
}

label {
  display: block;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.5rem;
  font-family: 'DM Mono', monospace;
}

input, select {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  transition: all 0.2s;
  outline: none;
}

input:focus, select:focus {
  border-color: var(--accent);
  background: rgba(108,99,255,0.06);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.file-drop {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  background: var(--surface-2);
}

.file-drop:hover, .file-drop.drag-over {
  border-color: var(--accent);
  background: rgba(108,99,255,0.06);
}

.file-drop input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.file-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.file-label { color: var(--text-muted); font-size: 0.85rem; font-family: 'DM Mono', monospace; }
.file-label b { color: var(--accent-3); }
.file-name { color: var(--accent-3); font-size: 0.85rem; margin-top: 0.5rem; font-family: 'DM Mono', monospace; }

.btn {
  width: 100%;
  padding: 0.875rem;
  border: none;
  border-radius: var(--radius);
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 1.75rem;
}

.btn-primary { background: linear-gradient(135deg, var(--accent), #9b59f0); color: white; }
.btn-secondary { background: linear-gradient(135deg, var(--accent-3), #00b894); color: #0a0a0f; }

.btn .spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }
.btn.loading .spinner { display: block; }

.result-section { padding: 0 2rem 2rem; display: none; }
.result-section.visible { display: block; }

.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
.result-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; font-family: 'DM Mono', monospace; }

pre {
  background: #080810;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  overflow: auto;
  max-height: 280px;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  color: #c8c8e8;
}

.json-key { color: #6c63ff; }
.json-string { color: #00d4aa; }
.json-number { color: #ffb347; }

.download-btn { margin: 0 2rem 2rem; display: none; text-decoration: none; }
.download-btn.visible { display: flex; }

.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  background: #2a1520; border: 1px solid #ff6b6b; color: #ff6b6b;
  padding: 0.75rem 1.25rem; border-radius: var(--radius);
  z-index: 100; transform: translateX(120%); transition: transform 0.3s;
}
.toast.show { transform: translateX(0); }

.badge {
  background: rgba(108,99,255,0.12); color: var(--accent);
  padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-family: 'DM Mono', monospace;
}
</style>
</head>

<body>
<div class="orb-2"></div>

<div class="wrapper">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">💳</div>
      <span class="logo-text">CardForge</span>
    </div>
    <p class="subtitle">Convertisseur de cartes → JSON <span class="badge">v2.1</span></p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="manual">
        <div class="tab-icon">✏️</div> Saisie manuelle
      </button>
      <button class="tab-btn" data-tab="excel">
        <div class="tab-icon">📊</div> Import Excel
      </button>
    </div>

    <div class="tab-content">
      <div class="tab-pane active" id="tab-manual">
        <form id="manualForm">
          <div class="form-group">
            <label>Numéro de carte</label>
            <input type="text" name="card_number" placeholder="ex: 123456789" required>
          </div>
          <div class="form-group">
            <label>Type de carte (CTR)</label>
            <select name="card_type">
              <option value="etudiant">🎓 Étudiant (2)</option>
              <option value="personnelle" selected>👤 Personnelle (1)</option>
              <option value="abonnement">📅 Abonnement (3)</option>
            </select>
          </div>
          <div class="row">
            <div class="form-group">
              <label>Année</label>
              <input type="text" name="year" placeholder="2026" maxlength="4" required>
            </div>
            <div class="form-group">
              <label>Mois</label>
              <input type="text" name="month" placeholder="04" maxlength="2" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="manualBtn">
            <span class="spinner"></span> <span class="btn-label">⚡ Convertir</span>
          </button>
        </form>
      </div>

      <div class="tab-pane" id="tab-excel">
        <form id="excelForm">
          <div class="form-group">
            <label>Fichier Excel</label>
            <div class="file-drop" id="fileDrop">
              <input type="file" name="file" accept=".xlsx,.xls" required id="fileInput">
              <div class="file-icon">📂</div>
              <div class="file-label">Colonnes obligatoires : <b>ns</b> et <b>ctr</b></div>
              <div class="file-name" id="fileName"></div>
            </div>
          </div>
          <div class="row">
            <div class="form-group">
              <label>Année</label>
              <input type="text" name="year" placeholder="2026" maxlength="4" required>
            </div>
            <div class="form-group">
              <label>Mois</label>
              <input type="text" name="month" placeholder="04" maxlength="2" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="excelBtn">
            <span class="spinner"></span> <span class="btn-label">📤 Upload & Convertir</span>
          </button>
        </form>
      </div>
    </div>

    <div class="result-section" id="resultSection">
      <div class="result-header">
        <div class="result-title">Aperçu JSON</div>
        <button class="badge" style="cursor:pointer; border:none;" id="copyBtn">Copier</button>
      </div>
      <pre id="result"></pre>
    </div>

    <a class="btn btn-secondary download-btn" id="downloadBtn">📥 Télécharger le JSON</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Gestion des Onglets
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn, .tab-pane').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    document.getElementById('resultSection').classList.remove('visible');
    document.getElementById('downloadBtn').classList.remove('visible');
  });
});

// Drag & Drop
const fileInput = document.getElementById('fileInput');
const fileName = document.getElementById('fileName');
fileInput.addEventListener('change', () => { fileName.textContent = fileInput.files[0]?.name || ''; });

// Validation basique
function validate(form) {
  const data = new FormData(form);
  const year = data.get('year');
  const month = data.get('month');
  if(!/^\d{4}$/.test(year)) return "Année invalide";
  if(!/^\d{2}$/.test(month) || month < 1 || month > 12) return "Mois invalide";
  return null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function syntaxHighlight(str) {
  return str.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+)/g, match => {
    let cls = 'json-number';
    if (/^"/.test(match)) { cls = /:$/.test(match) ? 'json-key' : 'json-string'; }
    return `<span class="${cls}">${match}</span>`;
  });
}

async function handleForm(e, url, btnId) {
  e.preventDefault();
  const btn = document.getElementById(btnId);
  const err = validate(e.target);
  if(err) return showToast("⚠️ " + err);

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(url, { method: 'POST', body: new FormData(e.target) });
    const result = await res.json();
    if(!res.ok) throw new Error(result.error || "Erreur serveur");

    document.getElementById('result').innerHTML = syntaxHighlight(JSON.stringify(result.data, null, 4));
    document.getElementById('resultSection').classList.add('visible');
    
    const dl = document.getElementById('downloadBtn');
    dl.href = '/download/' + result.filename;
    dl.classList.add('visible');
    dl.style.display = 'flex';

  } catch (err) {
    showToast("❌ " + err.message);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

document.getElementById('manualForm').addEventListener('submit', e => handleForm(e, '/convert', 'manualBtn'));
document.getElementById('excelForm').addEventListener('submit', e => handleForm(e, '/upload', 'excelBtn'));

document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('result').textContent);
  showToast("✅ Copié dans le presse-papier");
});
</script>
</body>
</html>
